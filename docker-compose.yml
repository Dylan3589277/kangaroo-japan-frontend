version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: kangaroo-postgres
    environment:
      POSTGRES_USER: kangaroo
      POSTGRES_PASSWORD: kangaroo_dev_password
      POSTGRES_DB: kangaroo_japan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kangaroo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kangaroo-redis
    command: redis-server --requirepass redis_dev_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kangaroo-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kangaroo.local
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - admin

volumes:
  postgres_data:
  redis_data:
